<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中小企業会計・財務 まとめサイト</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>📊 中小企業会計・財務 まとめサイト</h1>
            <p class="subtitle">5ch・X の実際の声から学ぶ会計ソフト利用状況と財務管理</p>
            <p class="last-updated">最終更新: <span id="lastUpdate">-</span></p>
        </div>
    </header>

    <main class="container">
        <section class="stats-section">
            <h2>📈 統計情報</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>総投稿数</h3>
                    <p class="stat-number" id="totalCount">-</p>
                </div>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
